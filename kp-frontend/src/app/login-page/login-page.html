<div class="login-page-container">
    <img class="logo-image" src="/kkeeptrackk.png"/>
    <div class="login-body">
        <h1 class="header-main">Welcome back!</h1>
        <div class="text-input-container">
            <input class="text-input" id="email" placeholder="Email" type="email" [(ngModel)]="email">
        </div>
        <div class="password-button-container">
            <div class="text-input-container">
                <input class="text-input" id="password" placeholder="Password" type="password" [(ngModel)]="password">
            </div>
            <img class="login-button" src="/loginButton.svg" (click)="handleLogin()">
        </div>
        @if (errorMessage) {
            <p class="error-message" style="color: red; font-size: 14px; text-align: center; white-space: pre-line;">{{ errorMessage }}</p>
        }
        <p class="register-redirect">Don't have an account? <a class="register-link" routerLink="/register">Sign up!</a></p>
    </div>
    
</div>
