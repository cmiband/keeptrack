spring.application.name=kp-backend

spring.datasource.url=jdbc:postgresql://localhost:5433/keeptrack
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.jwt.secret=keeptrack-dev-secret-key-at-least-32-bytes-long
spring.jwt.access-token-expiration=30 
spring.jwt.refresh-token-expiration=604800